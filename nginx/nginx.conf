upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# HTTP — redirect to HTTPS (with ACME challenge exception)
server {
    listen 80;
    server_name zelenyi-kutochok.com.ua www.zelenyi-kutochok.com.ua;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name zelenyi-kutochok.com.ua www.zelenyi-kutochok.com.ua;

    ssl_certificate     /etc/letsencrypt/live/zelenyi-kutochok.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zelenyi-kutochok.com.ua/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/admin/ {
        alias /app/staticfiles/admin/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }
}
