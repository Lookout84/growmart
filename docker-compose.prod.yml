version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: sh -c "python manage.py migrate --run-syncdb &&
                    python manage.py loaddata products/fixtures/categories.json || true &&
                    python manage.py collectstatic --noinput &&
                    gunicorn growmart.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - .env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    restart: always
    command: celery -A growmart worker --loglevel=info --concurrency=2
    volumes:
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=False
    depends_on:
      - backend
      - redis

  celery-beat:
    build: ./backend
    restart: always
    command: celery -A growmart beat --loglevel=info
    volumes:
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=False
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume:
  certbot_certs:
  certbot_webroot:
